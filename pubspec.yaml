name: netkit
description: Swiss Army Knife for Iranian internet users — encode, QR, ping, proxy, IP check.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # QR Code generation
  qr_flutter: ^4.1.0

  # Cryptography (MD5, SHA256)
  crypto: ^3.0.3

  # HTTP requests (ping, IP check)
  http: ^1.2.1

  # Share files (QR image)
  share_plus: ^9.0.0

  # File paths
  path_provider: ^2.1.3

  # Save image to gallery
  saver_gallery: ^3.0.6


  # Open URLs / deep links in browser or apps
  url_launcher: ^6.3.0

  # Persistent storage (proxy list)
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  change_app_package_name: ^1.5.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"

flutter:
  uses-material-design: true